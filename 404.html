<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found | Lawson University</title>
  <link rel="stylesheet" href="/styles/styles.css">
  <style>
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      color: var(--color-navy);
      line-height: 1;
      margin: 0;
    }
    .error-title {
      font-size: 2rem;
      color: var(--color-text);
      margin: 1rem 0;
    }
    .error-message {
      color: var(--color-text-light);
      max-width: 40ch;
      margin: 0 auto 2rem;
    }
    .error-cta {
      display: inline-block;
      background: var(--color-navy);
      color: white;
      padding: 0.875rem 2rem;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }
    .error-cta:hover { background: var(--color-gold); color: var(--color-navy); }
  </style>
</head>
<body>
  <main>
    <div class="error-page">
      <p class="error-code">404</p>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-message">The page you're looking for may have been moved or doesn't exist. Let's get you back on track.</p>
      <a href="/" class="error-cta">Return to Home</a>
    </div>
  </main>
</body>
</html>
